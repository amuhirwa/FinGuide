name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write # needed to create / update releases

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out source ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (Flutter toolchain requirement) ──────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter ───────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Install dependencies ──────────────────────────
      - name: Install Flutter dependencies
        working-directory: mobile
        run: flutter pub get

      # ── 5. Build release APK ─────────────────────────────
      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release

      # ── 6. Rename for a clean download filename ──────────
      - name: Rename APK
        run: |
          cp mobile/build/app/outputs/flutter-apk/app-release.apk finguide.apk

      # ── 7. Upload APK as artifact (for traceability) ─────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finguide-apk
          path: finguide.apk
          retention-days: 30

      # ── 8. Publish to a rolling "latest" GitHub Release ──
      #    The `latest` tag is force-updated on every push to
      #    main so the download URL is always stable:
      #    .../releases/latest/download/finguide.apk
      - name: Publish rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          body: |
            **Automatically built** from the latest commit on `main`.

            | | |
            |---|---|
            | **Commit** | `${{ github.sha }}` |
            | **Branch** | `${{ github.ref_name }}` |
            | **Built at** | ${{ github.event.head_commit.timestamp }} |

            ### Install
            1. Download **finguide.apk** below.
            2. On your Android device go to *Settings → Install unknown apps* and allow your browser/file manager.
            3. Open the downloaded file and tap **Install**.

            > This release is always overwritten on every push to `main`.
          artifacts: finguide.apk
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
