[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    --tb=short
    --strict-markers
    -v
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=70

markers =
    unit: Pure unit tests (no DB, no network)
    integration: Tests that use the test database and TestClient
    slow: Tests that take longer than 2 seconds
